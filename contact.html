<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Projet Web — Contact</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #2c3e50; color: white; padding: 2rem; text-align: center; }
    header h1 { font-size: 2rem; }
    header p { margin-top: 0.5rem; font-size: 1rem; opacity: 0.8; }
    nav { background: #34495e; display: flex; justify-content: center; gap: 2rem; padding: 1rem; }
    nav a { color: white; text-decoration: none; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    main { max-width: 600px; margin: 3rem auto; padding: 0 1rem; }
    .form-card { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .form-card h2 { margin-bottom: 1.5rem; color: #2c3e50; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; margin-bottom: 0.4rem; font-weight: bold; font-size: 0.9rem; }
    input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ccc;
                      border-radius: 4px; font-size: 1rem; font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: #2c3e50; }
    textarea { resize: vertical; min-height: 120px; }
    button[type="submit"] { width: 100%; background: #2c3e50; color: white;
                            border: none; padding: 0.9rem; border-radius: 4px;
                            font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
    button[type="submit"]:hover { background: #1a252f; }
    footer { text-align: center; padding: 2rem; color: #888; font-size: 0.9rem; margin-top: 3rem; }
  </style>
</head>
<body>
  <header>
    <h1>Mon Projet Web</h1>
    <p>Un site web collaboratif développé avec Git & GitHub</p>
  </header>

  <nav>
    <a href="index.html">Accueil</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">À propos</a>
  </nav>

  <main>
    <section class="form-card">
      <h2>Contactez-nous ✉️</h2>
      <form action="#" method="post">
        <div class="form-group">
          <label for="nom">Nom complet</label>
          <input type="text" id="nom" name="nom" placeholder="Jean Dupont" required />
        </div>

        <div class="form-group">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" name="email" placeholder="jean@exemple.com" required />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Votre message ici..." required></textarea>
        </div>

        <button type="submit">Envoyer le message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Mon Projet Web — TP Git &amp; GitHub</p>
  </footer>
</body>
</html>
